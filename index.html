<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog Moderno</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>/mnt</h1>
        <div>
            <button id="auth-btn">Login</button>
            <button id="post-btn" style="display: none;">Nova Postagem</button>
        </div>
    </header>
    <main>
        <div id="video-links">
            <h3>Vídeos</h3>
            <div id="videos-list">
                <!-- Vídeos serão adicionados aqui -->
            </div>
            <button id="add-video-btn" style="display: none; margin-top: 10px; background: #4CAF50; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Adicionar Vídeo</button>
        </div>
        <div id="posts">
            <!-- Posts serão adicionados aqui -->
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
